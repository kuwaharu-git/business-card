<svg xmlns="http://www.w3.org/2000/svg" width="900" height="504" viewBox="0 0 900 504">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="900" height="504" fill="url(#bgGrad)" rx="20"/>
  <!-- Accent bar -->
  <rect x="892" y="0" width="8" height="504" fill="url(#accentGrad)" rx="4"/>
  <!-- Decorative circles -->
  <circle cx="80" cy="80" r="120" fill="#0f3460" opacity="0.3"/>
  <circle cx="120" cy="430" r="80" fill="#e94560" opacity="0.15"/>
  <!-- Large Logo / Initial -->
  <circle cx="450" cy="180" r="90" fill="#0f3460" opacity="0.5"/>
  <text x="450" y="205" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="#e94560" text-anchor="middle">山</text>
  <!-- Company Name -->
  <text x="450" y="310" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="3">株式会社サンプル</text>
  <text x="450" y="345" font-family="Arial, sans-serif" font-size="16" fill="#718096" text-anchor="middle" letter-spacing="2">Sample Corporation</text>
  <!-- Divider -->
  <rect x="300" y="365" width="300" height="2" fill="url(#accentGrad)" rx="1"/>
  <!-- Tagline -->
  <text x="450" y="400" font-family="Arial, sans-serif" font-size="16" fill="#a0aec0" text-anchor="middle">〒100-0001 東京都千代田区 1-1-1</text>
  <text x="450" y="430" font-family="Arial, sans-serif" font-size="16" fill="#a0aec0" text-anchor="middle">TEL: 03-1234-5678 / FAX: 03-1234-5679</text>
  <text x="450" y="460" font-family="Arial, sans-serif" font-size="14" fill="#4a5568" text-anchor="middle">https://example.com</text>
  <!-- BACK label -->
  <text x="80" y="30" font-family="Arial, sans-serif" font-size="13" fill="#4a5568" text-anchor="middle">BACK</text>
</svg>
