<svg xmlns="http://www.w3.org/2000/svg" width="900" height="504" viewBox="0 0 900 504">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f3460;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="900" height="504" fill="url(#bgGrad)" rx="20"/>
  <!-- Accent bar -->
  <rect x="0" y="0" width="8" height="504" fill="url(#accentGrad)" rx="4"/>
  <!-- Decorative circles -->
  <circle cx="820" cy="80" r="120" fill="#0f3460" opacity="0.3"/>
  <circle cx="780" cy="430" r="80" fill="#e94560" opacity="0.15"/>
  <!-- Name -->
  <text x="80" y="200" font-family="Arial, sans-serif" font-size="52" font-weight="bold" fill="#ffffff" letter-spacing="2">山田 太郎</text>
  <text x="82" y="250" font-family="Arial, sans-serif" font-size="22" fill="#a0aec0" letter-spacing="1">Taro Yamada</text>
  <!-- Divider -->
  <rect x="80" y="275" width="200" height="2" fill="url(#accentGrad)" rx="1"/>
  <!-- Title -->
  <text x="80" y="315" font-family="Arial, sans-serif" font-size="20" fill="#e94560" letter-spacing="1">ソフトウェアエンジニア</text>
  <text x="80" y="345" font-family="Arial, sans-serif" font-size="16" fill="#718096">Software Engineer</text>
  <!-- Contact -->
  <text x="80" y="400" font-family="Arial, sans-serif" font-size="16" fill="#a0aec0">📧 taro.yamada@example.com</text>
  <text x="80" y="430" font-family="Arial, sans-serif" font-size="16" fill="#a0aec0">🌐 example.com</text>
  <!-- Company -->
  <text x="620" y="440" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff" text-anchor="middle">株式会社サンプル</text>
  <text x="620" y="465" font-family="Arial, sans-serif" font-size="13" fill="#718096" text-anchor="middle">Sample Corporation</text>
  <!-- FRONT label -->
  <text x="820" y="30" font-family="Arial, sans-serif" font-size="13" fill="#4a5568" text-anchor="middle">FRONT</text>
</svg>
